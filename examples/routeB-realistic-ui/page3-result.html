#p3-root{position:absolute;inset:0;overflow:hidden;

#p3-root *{box-sizing:border-box;margin:0;}
#p3-root .hdr{position:absolute;top:0;left:0;right:0;height:150px;display:flex;align-items:center;gap:22px;padding:0 60px;border-bottom:1px solid var(--line);background:rgba(242,238,231,.82);z-index:5;}

#p3-root .htit{font-weight:700;font-size:40px;letter-spacing:-.01em;}

#p3-root .menu{margin-left:auto;color:var(--ink2);}#p3-root .menu svg{width:46px;height:46px;}
#p3-root .card{position:absolute;left:54px;right:54px;top:230px;background:var(--surface);border:1px solid var(--line);border-radius:40px;padding:56px 56px 44px;box-shadow:0 4px 14px rgba(40,30,20,.05),0 60px 120px -55px rgba(40,30,20,.34);}
#p3-root .chead{display:flex;align-items:center;gap:22px;padding-bottom:34px;border-bottom:1px solid var(--line);margin-bottom:38px;}
#p3-root .chead .sp{width:64px;height:64px;border-radius:18px;background:var(--soft);display:flex;align-items:center;justify-content:center;color:var(--accent);}
#p3-root .chead .sp svg{width:40px;height:40px;}
#p3-root .ctitle{font-size:52px;font-weight:800;letter-spacing:-.02em;}
#p3-root .ctag{margin-left:auto;font-size:26px;color:var(--accent);background:var(--soft);padding:10px 24px;border-radius:100px;font-weight:500;}
#p3-root .sec{margin-bottom:36px;}
#p3-root .shead{display:flex;align-items:center;gap:16px;font-size:32px;font-weight:700;color:var(--ink);margin-bottom:22px;}
#p3-root .shead .si{width:40px;height:40px;color:var(--accent);}#p3-root .shead .si svg{width:40px;height:40px;}
#p3-root .item{display:flex;align-items:flex-start;gap:20px;font-size:36px;line-height:1.45;color:#3B382F;font-weight:400;padding:14px 0;}
#p3-root .item .ic{width:46px;height:46px;flex:0 0 46px;border-radius:50%;background:var(--okbg);color:var(--ok);display:flex;align-items:center;justify-content:center;margin-top:2px;}
#p3-root .item .ic svg{width:30px;height:30px;}
#p3-root .item.todo .ic{background:#F0ECF7;color:#7A6CB0;}
#p3-root .cfoot{display:flex;justify-content:flex-end;padding-top:26px;border-top:1px solid var(--line);}
#p3-root .copybtn{position:relative;display:flex;align-items:center;gap:16px;font-size:32px;font-weight:600;color:#fff;background:var(--accent);padding:22px 44px;border-radius:100px;box-shadow:0 10px 26px -8px rgba(204,120,92,.6);}
#p3-root .copybtn svg{width:38px;height:38px;}
#p3-root .b-copy,#p3-root .b-done{display:flex;align-items:center;gap:16px;}
#p3-root .b-done{position:absolute;inset:0;justify-content:center;opacity:0;}
#p3-root .cursor{position:absolute;left:0;top:0;width:54px;height:54px;z-index:50;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3));pointer-events:none;opacity:0;}
</style>

<script>(function(){
