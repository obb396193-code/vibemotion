<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<title>AI 帮你写周报 · Route B 拟真界面</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
<style>
  html,body{margin:0;width:1080px;height:1920px;overflow:hidden;background:#F2EEE7;}
  #root{position:relative;width:1080px;height:1920px;overflow:hidden;background:#F2EEE7;}
  #sec1{position:absolute;inset:0;z-index:1;will-change:transform,filter,opacity;}
  #sec2{position:absolute;inset:0;z-index:2;will-change:transform,filter,opacity;}
  #sec3{position:absolute;inset:0;z-index:3;will-change:transform,filter,opacity;}
</style>
</head>
<body>
<div id="root" data-composition-id="ai-report" data-width="1080" data-height="1920" data-start="0" data-duration="18">

  <!-- 3 个页面子合成，顶层只管接缝转场 -->
  <div id="sec1" data-composition-id="p1" data-composition-src="page1-input.html"    data-start="0"   data-duration="6.3" data-track-index="1"></div>
  <div id="sec2" data-composition-id="p2" data-composition-src="page2-thinking.html" data-start="5.9" data-duration="5.4" data-track-index="2"></div>
  <div id="sec3" data-composition-id="p3" data-composition-src="page3-result.html"   data-start="11"  data-duration="7"   data-track-index="3"></div>

  <!-- 音频（可选加分项）：BGM 垫底 + 打字声 + 点击声 -->
  <audio id="bgm"    src="audio/bgm.mp3"   data-start="0"    data-duration="18"  data-track-index="20" data-volume="0.16"></audio>
  <audio id="type"   src="audio/type.mp3"  data-start="1.6"  data-duration="1.8" data-track-index="21" data-volume="0.45"></audio>
  <audio id="click1" src="audio/click.mp3" data-start="4.05" data-duration="0.3" data-track-index="22" data-volume="0.6"></audio>
  <audio id="click2" src="audio/click.mp3" data-start="16.1" data-duration="0.3" data-track-index="23" data-volume="0.6"></audio>
</div>

<script>
  window.__timelines=window.__timelines||{};
  var tl=gsap.timeline({paused:true});

  // 初始：只 sec1 可见
  tl.set('#sec2',{opacity:0},0);
  tl.set('#sec3',{opacity:0},0);

  // 接缝 1（输入页 → 思考页 @6.0）：轻微缩+模糊推走 + 交叉淡入
  tl.to('#sec1',{opacity:0,scale:.95,filter:'blur(9px)',duration:.45,ease:'power2.in'},5.8);
  tl.to('#sec2',{opacity:1,duration:.42,ease:'power2.out'},5.9);
  tl.set('#sec1',{opacity:0},6.3);

  // 接缝 2（思考页 → 结果页 @11.0）：zoom-through 穿越（旧场放大模糊退、新场从略小弹清）
  tl.to('#sec2',{opacity:0,scale:1.08,filter:'blur(15px)',duration:.42,ease:'power3.in'},10.8);
  tl.fromTo('#sec3',{opacity:0,scale:.96},{opacity:1,scale:1,duration:.5,ease:'expo.out'},10.85);
  tl.set('#sec2',{opacity:0},11.3);

  window.__timelines["ai-report"]=tl;
</script>
</body>
</html>
