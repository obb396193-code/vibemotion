<template id="p1-template">
<div id="p1-root" data-composition-id="p1" data-width="1080" data-height="1920" data-duration="6">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap">
<style>
@font-face{font-family:'Hanken Grotesk';font-weight:400;font-display:block;src:url(fonts/HankenGrotesk-400.woff2) format('woff2');unicode-range:U+0000-00FF,U+2000-206F,U+2191,U+2193;}
@font-face{font-family:'Hanken Grotesk';font-weight:500;font-display:block;src:url(fonts/HankenGrotesk-500.woff2) format('woff2');unicode-range:U+0000-00FF,U+2000-206F;}
@font-face{font-family:'Hanken Grotesk';font-weight:700;font-display:block;src:url(fonts/HankenGrotesk-700.woff2) format('woff2');unicode-range:U+0000-00FF,U+2000-206F;}
@font-face{font-family:'Hanken Grotesk';font-weight:800;font-display:block;src:url(fonts/HankenGrotesk-800.woff2) format('woff2');unicode-range:U+0000-00FF,U+2000-206F;}
#p1-root{position:absolute;inset:0;overflow:hidden;
  --bg:#F2EEE7;--surface:#FFFFFF;--ink:#23211C;--ink2:#9A9385;--line:#EBE5DC;--accent:#CC785C;--soft:#F6E9E2;
  font-family:'Hanken Grotesk','Noto Sans SC',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
#p1-root *{box-sizing:border-box;margin:0;}
#p1-root .hdr{position:absolute;top:0;left:0;right:0;height:150px;display:flex;align-items:center;gap:22px;padding:0 60px;border-bottom:1px solid var(--line);background:rgba(242,238,231,.82);}
#p1-root .logo{width:62px;height:62px;border-radius:18px;background:var(--soft);display:flex;align-items:center;justify-content:center;color:var(--accent);}
#p1-root .logo svg{width:38px;height:38px;}
#p1-root .htit{font-weight:700;font-size:40px;letter-spacing:-.01em;}
#p1-root .hsub{font-size:24px;color:var(--ink2);font-weight:400;margin-top:2px;}
#p1-root .menu{margin-left:auto;color:var(--ink2);}
#p1-root .menu svg{width:46px;height:46px;}
#p1-root .greet{position:absolute;left:60px;top:300px;max-width:720px;background:var(--surface);border:1px solid var(--line);border-radius:8px 30px 30px 30px;padding:34px 40px;font-size:38px;line-height:1.45;color:var(--ink);box-shadow:0 2px 8px rgba(40,30,20,.04),0 30px 60px -40px rgba(40,30,20,.18);}
#p1-root .greet .em{color:var(--accent);font-weight:500;}
#p1-root .composer{position:absolute;left:48px;right:48px;bottom:90px;background:var(--surface);border:1px solid var(--line);border-radius:42px;padding:30px 30px 30px 36px;display:flex;align-items:center;gap:26px;box-shadow:0 2px 10px rgba(40,30,20,.05),0 40px 90px -50px rgba(40,30,20,.30);}
#p1-root .cplus{width:64px;height:64px;flex:0 0 64px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink2);}
#p1-root .cplus svg{width:36px;height:36px;}
#p1-root .ctext{flex:1;font-size:38px;color:var(--ink);min-height:48px;display:flex;align-items:center;flex-wrap:wrap;}
#p1-root .ctext .ph{color:var(--ink2);font-weight:400;}
#p1-root .ctext .ch{opacity:0;}
#p1-root .caret{display:inline-block;width:3px;height:44px;background:var(--accent);margin-left:3px;border-radius:2px;vertical-align:middle;}
#p1-root .cmic{width:60px;height:60px;flex:0 0 60px;display:flex;align-items:center;justify-content:center;color:var(--ink2);}
#p1-root .cmic svg{width:40px;height:40px;}
#p1-root .csend{width:74px;height:74px;flex:0 0 74px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 8px 22px -6px rgba(204,120,92,.6);}
#p1-root .csend svg{width:42px;height:42px;}
#p1-root .cursor{position:absolute;left:0;top:0;width:54px;height:54px;z-index:50;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3));pointer-events:none;}
</style>

<div class="hdr">
  <div class="logo"><svg viewBox="0 0 256 256" fill="currentColor"><path d="M197.58,129.06,146,110l-19-51.62a15.92,15.92,0,0,0-29.88,0L78,110l-51.62,19a15.92,15.92,0,0,0,0,29.88L78,178l19,51.62a15.92,15.92,0,0,0,29.88,0L146,178l51.62-19a15.92,15.92,0,0,0,0-29.88ZM137,164.22a8,8,0,0,0-4.74,4.74L112,223.85,91.78,169A8,8,0,0,0,87,164.22L32.15,144,87,123.78A8,8,0,0,0,91.78,119L112,64.15,132.22,119a8,8,0,0,0,4.74,4.74L191.85,144Z"/></svg></div>
  <div><div class="htit">AI 助手</div><div class="hsub">在线 · 随时帮你</div></div>
  <div class="menu"><svg viewBox="0 0 256 256" fill="currentColor"><path d="M128,96a32,32,0,1,0,32,32A32,32,0,0,0,128,96Zm0,48a16,16,0,1,1,16-16A16,16,0,0,1,128,144ZM48,96a32,32,0,1,0,32,32A32,32,0,0,0,48,96Zm0,48a16,16,0,1,1,16-16A16,16,0,0,1,48,144ZM208,96a32,32,0,1,0,32,32A32,32,0,0,0,208,96Zm0,48a16,16,0,1,1,16-16A16,16,0,0,1,208,144Z"/></svg></div>
</div>

<div class="greet" id="greet">你好 👋 今天想让我帮你做点<span class="em">什么</span>？</div>

<div class="composer" id="composer">
  <div class="cplus"><svg viewBox="0 0 256 256" fill="currentColor"><path d="M224,128a8,8,0,0,1-8,8H136v80a8,8,0,0,1-16,0V136H40a8,8,0,0,1,0-16h80V40a8,8,0,0,1,16,0v80h80A8,8,0,0,1,224,128Z"/></svg></div>
  <div class="ctext" id="ctext"><span class="ph" id="ph">输入你的需求…</span></div>
  <div class="cmic"><svg viewBox="0 0 256 256" fill="currentColor"><path d="M128,176a48.05,48.05,0,0,0,48-48V64a48,48,0,0,0-96,0v64A48.05,48.05,0,0,0,128,176ZM96,64a32,32,0,0,1,64,0v64a32,32,0,0,1-64,0Zm40,143.6V240a8,8,0,0,1-16,0V207.6A80.11,80.11,0,0,1,48,128a8,8,0,0,1,16,0,64,64,0,0,0,128,0,8,8,0,0,1,16,0A80.11,80.11,0,0,1,136,207.6Z"/></svg></div>
  <div class="csend" id="csend"><svg viewBox="0 0 256 256" fill="currentColor"><path d="M227.32,28.68a16,16,0,0,0-15.66-4.08l-.15,0L19.57,82.84a16,16,0,0,0-2.49,29.8L102,154l41.3,84.87A15.86,15.86,0,0,0,157.74,248q.69,0,1.38-.06a15.88,15.88,0,0,0,14-11.51l58.2-191.94c0-.05,0-.1,0-.15A16,16,0,0,0,227.32,28.68ZM157.83,231.85l-.05.14,0-.07-40.06-82.3,48-48a8,8,0,0,0-11.31-11.31l-48,48L24.08,98.25l-.07,0,.14,0L216,40Z"/></svg></div>
</div>

<svg class="cursor" id="cursor" viewBox="0 0 28 28"><path d="M6 2 L6 23 L11.5 17.8 L15 25 L18.2 23.4 L14.7 16.3 L22 16 Z" fill="#fff" stroke="#1a1a1a" stroke-width="1.4" stroke-linejoin="round"/></svg>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
<script>(function(){
  var root=document.getElementById('p1-root');
  var ctext=root.querySelector('#ctext'), ph=root.querySelector('#ph');
  // build typed message as char spans (deterministic, no random)
  var msg="帮我把这周的工作整理成一份周报";
  var spans=msg.split('').map(function(c){return '<span class="ch">'+c+'</span>';}).join('');
  ctext.innerHTML='<span class="typed">'+spans+'</span><span class="caret" id="caret"></span>';
  gsap.set('#p1-root .ch',{opacity:0});
  gsap.set('#p1-root #caret',{opacity:0});

  window.__timelines=window.__timelines||{};
  var tl=gsap.timeline({paused:true});

  // greeting + composer settle
  tl.fromTo('#p1-root .greet',{y:30,opacity:0},{y:0,opacity:1,duration:.6,ease:'power3.out'},0.25);
  tl.fromTo('#p1-root .composer',{y:24,opacity:0},{y:0,opacity:1,duration:.5,ease:'power3.out'},0.15);

  // cursor enters from bottom to the input field
  tl.fromTo('#p1-root #cursor',{left:'52%',top:'118%'},{left:'30%',top:'88.5%',duration:.85,ease:'power3.out'},0.5);
  // click into input: caret appears, placeholder hides
  tl.to('#p1-root #cursor',{scale:.82,duration:.1,transformOrigin:'18% 14%'},1.35);
  tl.to('#p1-root #cursor',{scale:1,duration:.18,transformOrigin:'18% 14%'},1.46);
  tl.set('#p1-root #ph',{display:'none'},1.45);
  tl.set('#p1-root #caret',{opacity:1},1.45);
  // caret blink (finite)
  tl.to('#p1-root #caret',{opacity:0,duration:.45,yoyo:true,repeat:5,ease:'steps(1)'},1.5);
  // type the message char by char
  tl.to('#p1-root .ch',{opacity:1,duration:.01,stagger:0.11,ease:'none'},1.6);

  // cursor travels to the send button, then clicks
  tl.to('#p1-root #cursor',{left:'90.5%',top:'88.5%',duration:.55,ease:'power2.inOut'},3.45);
  tl.to('#p1-root #cursor',{scale:.8,duration:.1,transformOrigin:'18% 14%'},4.05);
  tl.to('#p1-root #cursor',{scale:1,duration:.2,transformOrigin:'18% 14%'},4.16);
  // send reacts: pulse + caret off
  tl.set('#p1-root #caret',{opacity:0},4.05);
  tl.to('#p1-root .csend',{scale:.88,duration:.1,ease:'power2.in'},4.05);
  tl.to('#p1-root .csend',{scale:1,duration:.32,ease:'back.out(2.4)'},4.16);
  tl.to('#p1-root .csend',{boxShadow:'0 0 0 18px rgba(204,120,92,0)',duration:.5,ease:'power2.out'},4.2);
  // message "lifts off" (composer text clears, cursor fades)
  tl.to('#p1-root #cursor',{opacity:0,duration:.3},4.5);
  tl.to('#p1-root .composer',{y:-6,duration:.3,yoyo:true,repeat:1,ease:'power1.inOut'},4.2);
  tl.to({},{duration:.6},5.4);

  window.__timelines["p1"]=tl;
})();</script>
</div>
</template>
